version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: marketingos
      POSTGRES_USER: marketingos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-marketingos_dev}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./packages/backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketingos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://marketingos:${POSTGRES_PASSWORD:-marketingos_dev}@postgres:5432/marketingos
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents:ro
      - ./knowledge-base:/app/knowledge-base:ro

  scheduler:
    build:
      context: ./packages/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "dist/jobs/scheduler.js"]
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://marketingos:${POSTGRES_PASSWORD:-marketingos_dev}@postgres:5432/marketingos
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./agents:/app/agents:ro
      - ./knowledge-base:/app/knowledge-base:ro

  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
